---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: redis
    namespace: endurain
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app: redis
    template:
        metadata:
            labels:
                app: redis
        spec:
            containers:
                - name: valkey
                  image: valkey/valkey:8.1.8
                  ports:
                      - containerPort: 6379
                  readinessProbe:
                      exec:
                          command:
                              - valkey-cli
                              - ping
                      initialDelaySeconds: 5
                      periodSeconds: 5
                  resources:
                      requests:
                          cpu: 50m
                          memory: 128Mi
                      limits:
                          cpu: 250m
                          memory: 256Mi
