apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: forgejo-runner
  namespace: forgejo-runner
spec:
  pollingInterval: 15
  minReplicaCount: 0
  maxReplicaCount: 5
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 3
  jobTargetRef:
    backoffLimit: 0
    ttlSecondsAfterFinished: 86400
    template:
      metadata:
        labels:
          app: forgejo-runner
      spec:
        automountServiceAccountToken: false
        activeDeadlineSeconds: 14400
        restartPolicy: Never
        initContainers:
          - name: init-storage
            image: busybox:1.38
            command:
              - sh
              - -c
              - |
                mkdir -p /storage/workspaces
                chown -R 1000:1000 /storage /lifecycle
            volumeMounts:
              - name: runner-data
                mountPath: /storage
              - name: lifecycle
                mountPath: /lifecycle
        containers:
          - name: forgejo-runner
            image: data.forgejo.org/forgejo/runner:12
            env:
              - name: DOCKER_HOST
                value: tcp://127.0.0.1:2375
            command:
              - bash
              - -lc
              - |
                set -euo pipefail
                trap 'touch /lifecycle/runner-exited' EXIT

                until echo > /dev/tcp/127.0.0.1/2375; do
                  echo 'waiting for docker daemon...'
                  sleep 2
                done

                forgejo-runner -c /config/runner-config.yaml one-job --wait
            resources:
              limits:
                cpu: 1000m
                memory: 2Gi
              requests:
                cpu: 250m
                memory: 512Mi
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
            volumeMounts:
              - name: runner-data
                mountPath: /data
              - name: runner-config
                mountPath: /config/runner-config.yaml
                subPath: runner-config.yaml
                readOnly: true
              - name: lifecycle
                mountPath: /lifecycle
          - name: docker-dind
            image: docker:27-dind
            env:
              - name: DOCKER_TLS_CERTDIR
                value: ""
            command:
              - sh
              - -c
              - |
                set -eu
                dockerd -H tcp://127.0.0.1:2375 --tls=false &
                dockerd_pid=$!
                trap 'kill "$dockerd_pid"; wait "$dockerd_pid" || true' EXIT

                while [ ! -f /lifecycle/runner-exited ]; do
                  if ! kill -0 "$dockerd_pid" 2>/dev/null; then
                    exit 1
                  fi
                  sleep 2
                done
            securityContext:
              privileged: true
            resources:
              limits:
                cpu: 2000m
                memory: 4Gi
              requests:
                cpu: 500m
                memory: 1Gi
            volumeMounts:
              - name: docker-storage
                mountPath: /var/lib/docker
              - name: runner-data
                mountPath: /data
              - name: lifecycle
                mountPath: /lifecycle
        volumes:
          - name: runner-data
            emptyDir: {}
          - name: runner-config
            secret:
              secretName: forgejo-runner-secrets
          - name: docker-storage
            emptyDir: {}
          - name: lifecycle
            emptyDir: {}
  triggers:
    - type: forgejo-runner
      metadata:
        name: ubuntu-latest
        address: https://git.brennoflavio.com.br/
        global: "true"
        labels: ubuntu-latest,docker,clickable-ut24-1x,snapcraft-core24,clickable-ut24-1x-arm64,clickable-ut24-1x-amd64
      authenticationRef:
        name: forgejo-runner
