---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo-runner
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: init-storage
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /storage/runner /storage/docker
              chown -R 1000:1000 /storage/runner
          volumeMounts:
            - name: runner-storage
              mountPath: /storage
      containers:
        - name: forgejo-runner
          image: data.forgejo.org/forgejo/runner:12
          env:
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
          command:
            - bash
            - -lc
            - |
              until echo > /dev/tcp/127.0.0.1/2375; do
                echo 'waiting for docker daemon...'
                sleep 2
              done

              exec forgejo-runner daemon --config /config/runner-config.yaml
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: runner-storage
              mountPath: /data
              subPath: runner
            - name: runner-config
              mountPath: /config/runner-config.yaml
              subPath: runner-config.yaml
              readOnly: true
        - name: docker-dind
          image: docker:27-dind
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          args:
            - dockerd
            - -H
            - tcp://127.0.0.1:2375
            - --tls=false
          securityContext:
            privileged: true
          resources:
            limits:
              cpu: 2000m
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: runner-storage
              mountPath: /var/lib/docker
              subPath: docker
      volumes:
        - name: runner-storage
          persistentVolumeClaim:
            claimName: forgejo-runner
        - name: runner-config
          secret:
            secretName: forgejo-runner-secrets
