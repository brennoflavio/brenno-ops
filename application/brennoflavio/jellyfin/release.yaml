apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  releaseName: jellyfin
  chart:
    spec:
      chart: jellyfin
      version: 3.2.0
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: jellyfin
  interval: 30m
  install:
    remediation:
      retries: 3
  values:
    jellyfin:
      env:
        - name: DOTNET_USE_POLLING_FILE_WATCHER
          value: "1"
    service:
      type: NodePort
      nodePort: 30096
    ingress:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: lets-encrypt
        external-dns.alpha.kubernetes.io/target: brennoflavio.com.br
      hosts:
        - host: jellyfin.brennoflavio.com.br
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: jellyfin-tls
          hosts:
            - jellyfin.brennoflavio.com.br
    persistence:
      config:
        size: 5Gi
        annotations:
          volume.kubernetes.io/selected-node: brenno-server
      media:
        size: 100Gi
        annotations:
          volume.kubernetes.io/selected-node: brenno-server
