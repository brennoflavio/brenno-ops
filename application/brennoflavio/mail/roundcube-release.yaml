apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundcube
  namespace: mail
spec:
  releaseName: roundcube
  chart:
    spec:
      chart: roundcube
      version: 1.9.0
      sourceRef:
        kind: HelmRepository
        name: roundcube
        namespace: mail
  interval: 30m
  install:
    remediation:
      retries: 3
  postRenderers:
  - kustomize:
      patches:
      - target:
          group: apps
          version: v1
          kind: Deployment
          name: roundcube
        patch: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: roundcube
          spec:
            template:
              spec:
                containers:
                - name: roundcubemail
                  readinessProbe:
                    tcpSocket:
                      port: 9000
                    initialDelaySeconds: 10
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                - name: nginx
                  readinessProbe:
                    httpGet:
                      path: /healthz
                      port: 80
                    initialDelaySeconds: 10
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                  livenessProbe:
                    httpGet:
                      path: /healthz
                      port: 80
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 6
      - target:
          version: v1
          kind: ConfigMap
          name: roundcube
        patch: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: roundcube
          data:
            nginx.conf: |
              events {

              }

              http {
                include       /etc/nginx/mime.types;
                default_type  application/octet-stream;

                keepalive_timeout  65;
                client_max_body_size 25M;

                server {
                  listen 80 default_server;
                  listen [::]:80 default_server;

                  root /var/www/html;
                  server_name _;

                  index index.php;

                  location = /healthz {
                    access_log off;
                    default_type text/plain;
                    return 200 "ok\n";
                  }

                  location / {
                    try_files $uri $uri/ =404;
                  }

                  location ~ \.php$ {
                    include fastcgi_params;
                    fastcgi_param REQUEST_METHOD $request_method;
                    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                    fastcgi_pass 127.0.0.1:9000;
                  }
                }
              }
  values:
    database:
      source: external
    externalDatabase:
      type: sqlite
      host: /var/roundcube/db
    imap:
      host: mail.brennoflavio.com.br
      port: 993
      encryption: ssltls
    smtp:
      host: mail.brennoflavio.com.br
      port: 587
      encryption: starttls
      username: "%u"
      password: "%p"
    deployment:
      strategy:
        type: Recreate
      replicas: 1
      resources:
        requests:
          memory: "512Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "100m"
      additionalVolumeMounts:
      - name: roundcube-db
        mountPath: /var/roundcube/db
      additionalVolumes:
      - name: roundcube-db
        persistentVolumeClaim:
          claimName: roundcube-db
    ingress:
      enabled: true
      useTLS: true
      host: roundcube.brennoflavio.com.br
      ingressClassName: nginx
      tls:
        secretName: roundcube-tls
      additionalAnnotations:
        cert-manager.io/cluster-issuer: lets-encrypt
        external-dns.alpha.kubernetes.io/target: "brennoflavio.com.br"
